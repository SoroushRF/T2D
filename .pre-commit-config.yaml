repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: run-tests
        name: Run Unit Tests
        entry: .venv/Scripts/python.exe -m unittest test_spreadsheet_editor.py test_ui.py
        language: system
        pass_filenames: false
        always_run: true
